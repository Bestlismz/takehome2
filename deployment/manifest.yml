apiVersion: v1
kind: deployment
metadata:
  name: agent-api
  environment: production

spec:
  replicas: 2
  
  container:
    name: agent-api
    # TODO: This should be updated by the CD pipeline
    image_tag: "8ec77f5869ff952236756889a0e7d2a2014274ce"
    port: 8080
    
    env:
      - name: PROMPT_VERSION
        value: "v1.0.0"
    
    resources:
      cpu: "500m"
      memory: "512Mi"
    
    healthcheck:
      path: /healthz
      interval: 10s
      timeout: 5s

